<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 340" width="220" height="340">
  <defs>
    <radialGradient id="miaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF69B4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF69B4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="miaHair" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FF1493"/>
      <stop offset="100%" stop-color="#C8006A"/>
    </radialGradient>
    <radialGradient id="miaSkin" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFE4C4"/>
      <stop offset="100%" stop-color="#FFDAB9"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Glow aura -->
  <ellipse cx="110" cy="200" rx="100" ry="120" fill="url(#miaGlow)"/>

  <!-- Left twin tail -->
  <path d="M55,100 Q20,120 25,180 Q35,210 55,190 Q50,160 52,130 Z" fill="url(#miaHair)"/>
  <!-- Right twin tail -->
  <path d="M165,100 Q200,120 195,180 Q185,210 165,190 Q170,160 168,130 Z" fill="url(#miaHair)"/>

  <!-- Hair bows -->
  <ellipse cx="58" cy="108" rx="14" ry="8" fill="#FF69B4" transform="rotate(-20,58,108)"/>
  <ellipse cx="162" cy="108" rx="14" ry="8" fill="#FF69B4" transform="rotate(20,162,108)"/>
  <circle cx="58" cy="108" r="5" fill="#FFD700"/>
  <circle cx="162" cy="108" r="5" fill="#FFD700"/>

  <!-- Hair top -->
  <ellipse cx="110" cy="85" rx="55" ry="45" fill="url(#miaHair)"/>
  <!-- Hair front sweep -->
  <path d="M60,85 Q75,55 110,55 Q145,55 160,85" fill="url(#miaHair)"/>

  <!-- Head/face -->
  <ellipse cx="110" cy="120" rx="48" ry="52" fill="url(#miaSkin)"/>

  <!-- Blush cheeks -->
  <ellipse cx="78" cy="135" rx="14" ry="8" fill="#FFB6C1" opacity="0.7"/>
  <ellipse cx="142" cy="135" rx="14" ry="8" fill="#FFB6C1" opacity="0.7"/>

  <!-- Eyes - left -->
  <ellipse cx="92" cy="118" rx="13" ry="15" fill="#1A0033"/>
  <ellipse cx="92" cy="118" rx="10" ry="12" fill="#6A0FFF"/>
  <ellipse cx="92" cy="121" rx="7" ry="8" fill="#0A0022"/>
  <circle cx="97" cy="113" r="4" fill="white"/>
  <circle cx="94" cy="122" r="2" fill="white" opacity="0.6"/>
  <!-- Eyelashes left -->
  <line x1="80" y1="106" x2="78" y2="101" stroke="#1A0033" stroke-width="1.5"/>
  <line x1="92" y1="104" x2="90" y2="98" stroke="#1A0033" stroke-width="1.5"/>
  <line x1="103" y1="107" x2="105" y2="102" stroke="#1A0033" stroke-width="1.5"/>

  <!-- Eyes - right -->
  <ellipse cx="128" cy="118" rx="13" ry="15" fill="#1A0033"/>
  <ellipse cx="128" cy="118" rx="10" ry="12" fill="#6A0FFF"/>
  <ellipse cx="128" cy="121" rx="7" ry="8" fill="#0A0022"/>
  <circle cx="133" cy="113" r="4" fill="white"/>
  <circle cx="130" cy="122" r="2" fill="white" opacity="0.6"/>
  <!-- Eyelashes right -->
  <line x1="117" y1="107" x2="115" y2="102" stroke="#1A0033" stroke-width="1.5"/>
  <line x1="128" y1="104" x2="128" y2="98" stroke="#1A0033" stroke-width="1.5"/>
  <line x1="139" y1="106" x2="142" y2="101" stroke="#1A0033" stroke-width="1.5"/>

  <!-- Eyebrows -->
  <path d="M80,103 Q92,97 104,103" stroke="#8B0045" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M116,103 Q128,97 140,103" stroke="#8B0045" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <circle cx="110" cy="132" r="2.5" fill="#FFDAB9"/>

  <!-- Mouth - smile -->
  <path d="M97,143 Q110,153 123,143" stroke="#FF6699" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M100,145 Q110,149 120,145" fill="#FF99BB" opacity="0.5"/>

  <!-- Neck -->
  <rect x="96" y="168" width="28" height="22" rx="6" fill="url(#miaSkin)"/>

  <!-- Outfit/Body - K-pop idol jacket -->
  <path d="M55,190 Q70,175 96,172 L124,172 Q150,175 165,190 L170,290 L50,290 Z" fill="#FF1493"/>
  <!-- Outfit collar/lapels -->
  <path d="M96,172 Q100,185 110,190 Q120,185 124,172 Q115,176 110,180 Q105,176 96,172 Z" fill="white" opacity="0.9"/>
  <!-- Star on chest -->
  <polygon points="110,196 114,207 126,207 116,214 120,225 110,218 100,225 104,214 94,207 106,207" fill="#FFD700" filter="url(#glow)"/>
  <!-- Outfit trim -->
  <path d="M55,190 L50,290" stroke="#C8006A" stroke-width="2"/>
  <path d="M165,190 L170,290" stroke="#C8006A" stroke-width="2"/>
  <!-- Belt -->
  <rect x="62" y="230" width="96" height="12" rx="6" fill="#FFD700"/>
  <rect x="104" y="228" width="12" height="16" rx="3" fill="#FF69B4"/>

  <!-- Skirt -->
  <path d="M50,290 Q55,320 75,330 L145,330 Q165,320 170,290 Z" fill="#C8006A"/>
  <!-- Skirt decoration -->
  <path d="M62,295 Q75,310 110,313 Q145,310 158,295" stroke="#FFD700" stroke-width="1.5" fill="none"/>

  <!-- Left arm -->
  <path d="M55,190 Q35,210 28,240 Q32,248 40,244 Q44,220 62,200 Z" fill="url(#miaSkin)"/>
  <!-- Right arm with wand -->
  <path d="M165,190 Q185,210 192,235 Q188,244 180,240 Q176,218 158,200 Z" fill="url(#miaSkin)"/>

  <!-- Magic wand -->
  <rect x="186" y="230" width="6" height="55" rx="3" fill="#9D00FF" transform="rotate(-15,186,230)"/>
  <!-- Wand star -->
  <polygon points="193,222 196,231 205,231 198,237 201,246 193,240 185,246 188,237 181,231 190,231" fill="#FFD700" filter="url(#glow)"/>
  <!-- Wand sparkles -->
  <circle cx="208" cy="215" r="5" fill="#FFD700" opacity="0.8" filter="url(#glow)"/>
  <circle cx="215" cy="225" r="3" fill="#FF69B4" opacity="0.8"/>
  <circle cx="205" cy="208" r="4" fill="#00BFFF" opacity="0.8"/>
  <text x="195" y="213" font-size="10" fill="#FFD700">✦</text>
  <text x="210" y="240" font-size="8" fill="#FF69B4">✦</text>

  <!-- Shoes -->
  <ellipse cx="78" cy="332" rx="22" ry="10" fill="#FF1493"/>
  <ellipse cx="142" cy="332" rx="22" ry="10" fill="#FF1493"/>
  <ellipse cx="78" cy="330" rx="20" ry="8" fill="#FF69B4"/>
  <ellipse cx="142" cy="330" rx="20" ry="8" fill="#FF69B4"/>

  <!-- Name tag -->
  <rect x="75" y="6" width="70" height="24" rx="12" fill="#FFD700"/>
  <text x="110" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A0033" text-anchor="middle">✦ MIA ✦</text>
</svg>
