<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="phantomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6EC7"/>
      <stop offset="50%" stop-color="#8844CC"/>
      <stop offset="100%" stop-color="#4488FF"/>
    </linearGradient>
    <filter id="phantomBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Ghost tail wisps -->
  <path d="M65,220 Q70,240 60,255 Q75,245 80,258 Q90,240 95,230" fill="url(#phantomGrad)" opacity="0.8"/>
  <path d="M105,228 Q108,248 100,260 Q115,248 120,260 Q125,245 130,235" fill="url(#phantomGrad)" opacity="0.8"/>
  <path d="M135,222 Q138,242 130,255 Q145,244 148,256 Q152,240 155,230" fill="url(#phantomGrad)" opacity="0.8"/>

  <!-- Wispy ghost body -->
  <path d="M55,150 Q40,180 45,220 L155,220 Q160,180 145,150 Q130,100 100,90 Q70,100 55,150 Z" fill="url(#phantomGrad)" opacity="0.9"/>

  <!-- Fraction line dividing body (half pink, half blue) -->
  <line x1="42" y1="165" x2="158" y2="165" stroke="white" stroke-width="3" stroke-dasharray="6,3"/>

  <!-- 1/2 label on body -->
  <text x="92" y="155" font-size="20" fill="white" font-weight="bold" font-family="Arial">1</text>
  <line x1="88" y1="163" x2="112" y2="163" stroke="white" stroke-width="2"/>
  <text x="92" y="182" font-size="20" fill="white" font-weight="bold" font-family="Arial">2</text>

  <!-- Head -->
  <ellipse cx="100" cy="115" rx="50" ry="48" fill="url(#phantomGrad)" opacity="0.95"/>

  <!-- Large spooky eyes -->
  <ellipse cx="83" cy="108" rx="16" ry="18" fill="white"/>
  <ellipse cx="83" cy="110" rx="10" ry="12" fill="#2200AA"/>
  <ellipse cx="83" cy="112" rx="6" ry="7" fill="#000033"/>
  <circle cx="87" cy="105" r="4" fill="white"/>

  <ellipse cx="117" cy="108" rx="16" ry="18" fill="white"/>
  <ellipse cx="117" cy="110" rx="10" ry="12" fill="#2200AA"/>
  <ellipse cx="117" cy="112" rx="6" ry="7" fill="#000033"/>
  <circle cx="121" cy="105" r="4" fill="white"/>

  <!-- Wavy phantom mouth -->
  <path d="M82,130 Q88,135 94,130 Q100,125 106,130 Q112,135 118,130" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Floating fraction symbols -->
  <text x="15" y="100" font-size="22" fill="#FF6EC7" opacity="0.8">½</text>
  <text x="162" y="95" font-size="22" fill="#4488FF" opacity="0.8">¾</text>
  <text x="22" y="160" font-size="16" fill="white" opacity="0.6">⅓</text>
  <text x="165" y="158" font-size="16" fill="white" opacity="0.6">⅔</text>

  <!-- Ethereal wisps -->
  <ellipse cx="30" cy="130" rx="12" ry="8" fill="#FF6EC7" opacity="0.4" filter="url(#phantomBlur)"/>
  <ellipse cx="170" cy="135" rx="12" ry="8" fill="#4488FF" opacity="0.4" filter="url(#phantomBlur)"/>

  <!-- Name -->
  <rect x="25" y="238" width="150" height="20" rx="10" fill="#2200AA" opacity="0.8"/>
  <text x="100" y="252" font-family="Arial" font-size="11" fill="#FF6EC7" text-anchor="middle" font-weight="bold">FRACTION PHANTOM</text>
</svg>
