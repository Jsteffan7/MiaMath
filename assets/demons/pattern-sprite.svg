<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="spriteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="33%" stop-color="#FF6EC7"/>
      <stop offset="66%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#66FF99"/>
    </linearGradient>
  </defs>

  <!-- Pixel-style wings -->
  <!-- Left wing (pixelated) -->
  <rect x="8" y="100" width="16" height="16" fill="#FFD700" opacity="0.9"/>
  <rect x="8" y="116" width="24" height="16" fill="#FF6EC7" opacity="0.9"/>
  <rect x="8" y="132" width="32" height="16" fill="#00BFFF" opacity="0.9"/>
  <rect x="16" y="148" width="24" height="16" fill="#66FF99" opacity="0.9"/>
  <rect x="24" y="164" width="16" height="16" fill="#FFD700" opacity="0.9"/>

  <!-- Right wing (pixelated) -->
  <rect x="176" y="100" width="16" height="16" fill="#FFD700" opacity="0.9"/>
  <rect x="168" y="116" width="24" height="16" fill="#FF6EC7" opacity="0.9"/>
  <rect x="160" y="132" width="32" height="16" fill="#00BFFF" opacity="0.9"/>
  <rect x="160" y="148" width="24" height="16" fill="#66FF99" opacity="0.9"/>
  <rect x="160" y="164" width="16" height="16" fill="#FFD700" opacity="0.9"/>

  <!-- Body (pixel art style) -->
  <rect x="60" y="140" width="80" height="80" rx="8" fill="url(#spriteGrad)"/>
  <!-- Pixel pattern on body -->
  <rect x="70" y="150" width="14" height="14" fill="#FFD700" opacity="0.6"/>
  <rect x="92" y="150" width="14" height="14" fill="#FF6EC7" opacity="0.6"/>
  <rect x="116" y="150" width="14" height="14" fill="#00BFFF" opacity="0.6"/>
  <rect x="70" y="172" width="14" height="14" fill="#00BFFF" opacity="0.6"/>
  <rect x="92" y="172" width="14" height="14" fill="#66FF99" opacity="0.6"/>
  <rect x="116" y="172" width="14" height="14" fill="#FFD700" opacity="0.6"/>
  <rect x="70" y="194" width="14" height="14" fill="#FF6EC7" opacity="0.6"/>
  <rect x="92" y="194" width="14" height="14" fill="#FFD700" opacity="0.6"/>
  <rect x="116" y="194" width="14" height="14" fill="#66FF99" opacity="0.6"/>

  <!-- Head (pixelated) -->
  <rect x="55" y="65" width="90" height="85" rx="10" fill="url(#spriteGrad)"/>
  <!-- Pixel eyes (big square) -->
  <rect x="68" y="85" width="26" height="26" rx="3" fill="#1A0033"/>
  <rect x="70" y="87" width="22" height="22" rx="2" fill="#FFD700"/>
  <rect x="76" y="93" width="10" height="10" fill="#1A0033"/>
  <rect x="78" y="95" width="5" height="5" fill="#FFFFFF"/>

  <rect x="106" y="85" width="26" height="26" rx="3" fill="#1A0033"/>
  <rect x="108" y="87" width="22" height="22" rx="2" fill="#FF6EC7"/>
  <rect x="114" y="93" width="10" height="10" fill="#1A0033"/>
  <rect x="116" y="95" width="5" height="5" fill="#FFFFFF"/>

  <!-- Pixel smile -->
  <rect x="70" y="123" width="10" height="8" fill="#1A0033"/>
  <rect x="80" y="127" width="10" height="8" fill="#1A0033"/>
  <rect x="90" y="129" width="20" height="8" fill="#1A0033"/>
  <rect x="110" y="127" width="10" height="8" fill="#1A0033"/>
  <rect x="120" y="123" width="10" height="8" fill="#1A0033"/>
  <!-- Smile fill -->
  <rect x="72" y="125" width="56" height="6" fill="#FF6EC7" opacity="0.8"/>

  <!-- Number pattern floating around -->
  <text x="10" y="78" font-size="15" fill="#FFD700" font-weight="bold">1</text>
  <text x="25" y="90" font-size="15" fill="#FF6EC7" font-weight="bold">2</text>
  <text x="10" y="108" font-size="15" fill="#00BFFF" font-weight="bold">3</text>
  <text x="162" y="78" font-size="15" fill="#66FF99" font-weight="bold">4</text>
  <text x="175" y="90" font-size="15" fill="#FFD700" font-weight="bold">5</text>
  <text x="162" y="108" font-size="15" fill="#FF6EC7" font-weight="bold">6</text>

  <!-- Antenna -->
  <line x1="100" y1="65" x2="100" y2="45" stroke="#FFD700" stroke-width="3"/>
  <circle cx="100" cy="40" r="8" fill="#FFD700"/>
  <text x="96" y="44" font-size="9" fill="#1A0033" font-weight="bold">?</text>

  <!-- Name -->
  <rect x="28" y="232" width="144" height="20" rx="10" fill="#4A0080" opacity="0.8"/>
  <text x="100" y="246" font-family="Arial" font-size="11" fill="#FFD700" text-anchor="middle" font-weight="bold">PATTERN SPRITE</text>
</svg>
