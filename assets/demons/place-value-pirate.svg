<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 270" width="200" height="270">
  <defs>
    <radialGradient id="pirateBody" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#CC5500"/>
    </radialGradient>
  </defs>

  <!-- Pirate hat -->
  <ellipse cx="100" cy="62" rx="60" ry="12" fill="#1A1A2E"/>
  <rect x="60" y="20" width="80" height="48" rx="8" fill="#1A1A2E"/>
  <!-- Skull & crossbones on hat, but with numbers -->
  <circle cx="100" cy="40" r="18" fill="#DDDDEE"/>
  <text x="91" y="44" font-size="14" fill="#1A1A2E" font-weight="bold">1,0</text>
  <text x="90" y="58" font-size="9" fill="#FFD700">T H O</text>
  <!-- Hat feather -->
  <path d="M148,38 Q165,20 170,5 Q160,18 150,30 Q155,15 158,5 Q148,20 144,35 Z" fill="#FF8C00"/>

  <!-- Body -->
  <ellipse cx="100" cy="180" rx="65" ry="70" fill="url(#pirateBody)"/>
  <!-- Coat detail -->
  <path d="M68,145 Q75,165 72,210 L65,215 Q68,165 60,145 Z" fill="#CC5500"/>
  <path d="M132,145 Q125,165 128,210 L135,215 Q132,165 140,145 Z" fill="#CC5500"/>
  <!-- Buttons (number tags) -->
  <circle cx="100" cy="155" r="8" fill="#FFD700"/>
  <text x="97" y="159" font-size="7" fill="#1A1A2E" font-weight="bold">1s</text>
  <circle cx="100" cy="175" r="8" fill="#FFD700"/>
  <text x="96" y="179" font-size="7" fill="#1A1A2E" font-weight="bold">10s</text>
  <circle cx="100" cy="195" r="8" fill="#FFD700"/>
  <text x="93" y="199" font-size="7" fill="#1A1A2E" font-weight="bold">100s</text>

  <!-- Head -->
  <ellipse cx="100" cy="105" rx="50" ry="48" fill="url(#pirateBody)"/>

  <!-- Eye patch (left eye) -->
  <circle cx="80" cy="100" r="20" fill="#1A1A2E"/>
  <circle cx="80" cy="100" r="16" fill="#333355"/>
  <text x="71" y="105" font-size="16" fill="#FFD700" font-weight="bold">0</text>
  <!-- Eye patch string -->
  <path d="M64,85 Q72,80 80,80 Q88,80 96,86" stroke="#1A1A2E" stroke-width="2" fill="none"/>

  <!-- Good eye (right) -->
  <circle cx="120" cy="100" r="16" fill="#1A1A2E"/>
  <circle cx="120" cy="100" r="12" fill="#FF6600"/>
  <circle cx="120" cy="102" r="7" fill="#1A1A2E"/>
  <circle cx="124" cy="96" r="3" fill="white"/>

  <!-- Nose -->
  <ellipse cx="100" cy="114" rx="6" ry="4" fill="#CC5500"/>

  <!-- Grin showing number teeth -->
  <path d="M75,122 Q100,138 125,122" fill="#1A1A2E"/>
  <path d="M79,122 Q100,132 121,122" fill="#FF8C00"/>
  <rect x="83" y="121" width="10" height="10" rx="1" fill="#FFFFD0"/>
  <text x="84" y="130" font-size="7" fill="#1A1A2E" font-weight="bold">T</text>
  <rect x="96" y="121" width="10" height="10" rx="1" fill="#FFFFD0"/>
  <text x="97" y="130" font-size="7" fill="#1A1A2E" font-weight="bold">H</text>
  <rect x="109" y="121" width="10" height="10" rx="1" fill="#FFFFD0"/>
  <text x="110" y="130" font-size="7" fill="#1A1A2E" font-weight="bold">O</text>

  <!-- Arms -->
  <path d="M35,158 Q22,185 38,210" stroke="#CC5500" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M35,158 Q22,185 38,210" stroke="#FF8C00" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Hook hand with number -->
  <circle cx="38" cy="210" r="16" fill="#FFD700"/>
  <text x="29" y="215" font-size="14" fill="#1A1A2E" font-weight="bold">1K</text>

  <path d="M165,158 Q178,185 162,210" stroke="#CC5500" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M165,158 Q178,185 162,210" stroke="#FF8C00" stroke-width="12" stroke-linecap="round" fill="none"/>
  <circle cx="162" cy="210" r="16" fill="#FFD700"/>
  <text x="154" y="215" font-size="14" fill="#1A1A2E" font-weight="bold">100</text>

  <!-- Floating numbers -->
  <text x="8" y="130" font-size="20" fill="#FFD700" opacity="0.8" font-weight="bold">4</text>
  <text x="13" y="150" font-size="14" fill="#FF8C00" opacity="0.8">738</text>
  <text x="163" y="125" font-size="20" fill="#FFD700" opacity="0.8" font-weight="bold">2</text>
  <text x="160" y="145" font-size="14" fill="#FF8C00" opacity="0.8">506</text>

  <!-- Name -->
  <rect x="18" y="248" width="164" height="20" rx="10" fill="#661100" opacity="0.8"/>
  <text x="100" y="262" font-family="Arial" font-size="10" fill="#FFD700" text-anchor="middle" font-weight="bold">PLACE VALUE PIRATE</text>
</svg>
